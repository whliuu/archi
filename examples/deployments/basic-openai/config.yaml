# Basic configuration file for an Archi deployment
# with a chat app interface and PostgreSQL with pgvector for document storage.
# The LLM is used through OpenAI.
#
# run with:
# archi create --name my-archi-openai --config examples/deployments/basic-openai/config.yaml --services chatbot
#
# (Omit --hostmode on Docker Desktop for Mac/Windows — host networking is
#  unreachable from the host there; default published ports work. --hostmode is
#  only for native Linux hosts.)
#
# required env var:
# export OPENAI_API_KEY=your_api_key

name: my_archi

services:
  chat_app:
    agent_class: CMSCompOpsAgent
    agents_dir: examples/agents
    client_timeout_seconds: 1800
    default_provider: openai
    default_model: gpt-4o
    providers:
      openai:
        enabled: true
        default_model: "gpt-4o"
        models:
          - "gpt-4o"
          - "gpt-5"
      local:
        enabled: false
    trained_on: "My data"
    port: 7866
    external_port: 7866
  vectorstore:
    backend: postgres # PostgreSQL with pgvector (only supported backend)
  data_manager:
    port: 7889
    external_port: 7889
    auth:
      enabled: false # set to true and provide DM_API_TOKEN in .env for production

data_manager:
  sources:
    links:
      input_lists:
        - examples/deployments/basic-openai/miscellanea.list
  embedding_name: HuggingFaceEmbeddings
