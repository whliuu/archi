# Basic Archi deployment using OpenRouter as the LLM provider.
# Chat app interface + PostgreSQL/pgvector for document storage.
#
# run with:
#   archi create --name my-archi-openrouter \
#     --config examples/deployments/basic-openrouter/config.yaml \
#     --services chatbot --hostmode \
#     --env-file ../../.env
#
# required env var (in the --env-file):
#   OPENROUTER_API_KEY=sk-or-...
#   PG_PASSWORD=...
# optional:
#   OPENROUTER_SITE_URL, OPENROUTER_APP_NAME

name: my_archi

services:
  chat_app:
    agent_class: CMSCompOpsAgent
    agents_dir: examples/agents
    client_timeout_seconds: 1800
    default_provider: openrouter
    default_model: qwen/qwen-2.5-72b-instruct
    providers:
      openrouter:
        enabled: true
        default_model: "qwen/qwen-2.5-72b-instruct"
        models:
          - "qwen/qwen-2.5-72b-instruct"
          - "meta-llama/llama-3.3-70b-instruct"
          - "deepseek/deepseek-r1"
      local:
        enabled: false
    trained_on: "My data"
    port: 7866
    external_port: 7866
  vectorstore:
    backend: postgres # PostgreSQL with pgvector (only supported backend)
  data_manager:
    port: 7889
    external_port: 7889
    auth:
      enabled: false # set true + DM_API_TOKEN in .env for production

data_manager:
  sources:
    links:
      input_lists:
        - examples/deployments/basic-openai/miscellanea.list
  # CPU-friendly open-source embeddings (no API key needed).
  embedding_name: HuggingFaceEmbeddings
